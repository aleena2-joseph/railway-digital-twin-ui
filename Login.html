<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Twin - Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/login.css">
    <script src="js/login.js" defer></script>
</head>
<body>

    <main class="login-container">

        <div class="frame">

            <div class="login-card">

                <span class="corner corner-tl" aria-hidden="true"></span>
                <span class="corner corner-tr" aria-hidden="true"></span>
                <span class="corner corner-bl" aria-hidden="true"></span>
                <span class="corner corner-br" aria-hidden="true"></span>

                <div class="rail-accent" aria-hidden="true"></div>

                <div class="brand">
                    <div class="logo" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 17 L19 17 M7 17 V7a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v10 M9 21 L7 17 M15 21 L17 17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="9.5" cy="13" r="0.9" fill="currentColor"/>
                            <circle cx="14.5" cy="13" r="0.9" fill="currentColor"/>
                        </svg>
                    </div>
                    <h1>Digital Twin</h1>
                    <p class="subtitle">Monitoring Platform</p>
                </div>

                <form id="login-form" novalidate>

                    <div class="form-group">
                        <label for="username">Operator ID</label>
                        <input type="text" id="username" name="username" placeholder="e.g. RDT-0042" autocomplete="username">
                    </div>

                    <div class="form-group">
                        <label for="password">Access Key</label>
                        <div class="password-wrap">
                            <input type="password" id="password" name="password" placeholder="Enter access key" autocomplete="current-password">
                            <button type="button" class="toggle-visibility" id="toggle-visibility" aria-label="Show access key" aria-pressed="false">
                                <svg class="icon-eye" viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7Z" stroke="currentColor" stroke-width="1.5"/>
                                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="row-between">
                        <div class="remember">
                            <input type="checkbox" id="remember">
                            <label for="remember">Keep session active</label>
                        </div>
                        <a href="#" class="forgot-link">Forgot key?</a>
                    </div>

                    <button type="submit" class="login-btn" id="login-btn">
                        <span class="btn-label">Login</span>
                        <svg class="btn-arrow" viewBox="0 0 24 24" width="16" height="16" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>

                </form>

                <p class="footer-text">NODE&nbsp;CTRL-04&nbsp;&middot;&nbsp;BUILD&nbsp;2.0.114&nbsp;&middot;&nbsp;Railway Operations Control Center</p>

            </div>

        </div>

    </main>

</body>
</html>
